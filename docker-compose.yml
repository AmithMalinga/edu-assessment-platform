version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: exam-master-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: exam_master
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
