name: CI Build

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  install:
    runs-on: ubuntu-latest
    name: Install Dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

  # lint:
  #   runs-on: ubuntu-latest
  #   needs: install
  #   name: Lint Code
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'

  #     - name: Install Dependencies
  #       run: npm ci

  #     - name: Lint Admin Project
  #       run: npm run lint --workspace=admin

  #     - name: Lint Server Project
  #       run: npm run lint --workspace=server

  #     - name: Lint Database Package
  #       run: npm run lint --workspace=@repo/database

  build:
    runs-on: ubuntu-latest
    needs: install
    name: Build All Projects
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build Admin Project
        run: npm run build --workspace=admin

      - name: Build Server Project
        run: npm run build --workspace=server

      - name: Build Web Project
        run: npm run build --workspace=web

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/admin/dist
            apps/web/.next
            apps/server/dist
          retention-days: 5
